<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Document Summarizer - Tóm tắt tài liệu</title>
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css?v=2" />
  </head>
  <body>
    <div class="app-container">
      <header class="app-header">
        <div class="brand">
          <div class="logo-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="sparkle-icon">
              <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
            </svg>
          </div>
          <div>
            <p class="eyebrow">AI Document Intelligence</p>
            <h1>Tóm tắt tài liệu</h1>
          </div>
        </div>
        <div class="status-container">
          <span class="status-label">Trạng thái:</span>
          <span id="statusBadge" class="status-badge" data-state="idle">Sẵn sàng</span>
        </div>
      </header>

      <main class="dashboard-grid">
        <!-- Left Panel: Configuration & File Upload -->
        <section class="panel-card config-panel">
          <form id="summaryForm">
            <div class="section-header">
              <div class="section-title">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <span>Cấu hình dịch vụ AI</span>
              </div>
            </div>

            <div class="fields-container">
              <div class="form-row">
                <div class="form-group">
                  <label for="provider">AI Provider</label>
                  <div class="select-wrapper">
                    <select name="provider" id="provider">
                      <option value="openai">OpenAI</option>
                      <option value="claude">Claude</option>
                      <option value="gemini">Gemini</option>
                      <option value="custom">Custom API</option>
                    </select>
                  </div>
                </div>

                <div class="form-group">
                  <label for="model">AI Model</label>
                  <div class="model-row">
                    <div class="select-wrapper">
                      <select name="model" id="model"></select>
                    </div>
                    <button id="loadModelsButton" type="button" class="btn-load" title="Tải danh sách model trực tiếp từ provider">
                      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="spin-icon">
                        <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                        <path d="M3 3v5h5"/>
                        <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/>
                        <path d="M16 16h5v5"/>
                      </svg>
                      <span>Tải model</span>
                    </button>
                  </div>
                </div>
              </div>

              <!-- Inline custom model input & hint under model selection to keep it neat -->
              <div class="form-row custom-model-row">
                <div class="form-group full-width">
                  <input id="customModel" class="is-hidden input-text" type="text" placeholder="Nhập tên model custom (ví dụ: llama-3.1-8b-instruct)..." />
                  <span id="modelHint" class="hint-text">Danh sách mặc định, có thể tải model theo API key.</span>
                </div>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label for="api_key">API Key</label>
                  <div class="input-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="input-icon">
                      <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
                      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <input id="api_key" name="api_key" type="password" autocomplete="off" placeholder="Có thể để trống nếu đã cấu hình env" />
                  </div>
                </div>

                <div class="form-group is-hidden" id="baseUrlField">
                  <label for="baseUrl">Base URL</label>
                  <div class="input-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="input-icon">
                      <circle cx="12" cy="12" r="10"/>
                      <line x1="2" x2="22" y1="12" y2="12"/>
                      <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                    </svg>
                    <input name="base_url" id="baseUrl" type="url" placeholder="https://api.example.com/v1" />
                  </div>
                </div>
              </div>
            </div>

            <div class="section-header margin-top-lg">
              <div class="section-title">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                  <polyline points="17 8 12 3 7 8"/>
                  <line x1="12" x2="12" y1="3" y2="15"/>
                </svg>
                <span>Tải tài liệu lên</span>
              </div>
            </div>

            <label class="upload-zone" for="file">
              <input id="file" name="file" type="file" accept=".txt,.pdf,.docx" required />
              <div class="upload-icon-container">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="upload-arrow">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                  <polyline points="17 8 12 3 7 8"/>
                  <line x1="12" x2="12" y1="3" y2="15"/>
                </svg>
              </div>
              <strong id="fileName">Chọn file .txt, .pdf hoặc .docx</strong>
              <span class="upload-hint">Kéo thả hoặc click để tải lên tài liệu cần tóm tắt</span>
            </label>

            <div class="actions-container">
              <button id="submitButton" type="submit" class="btn-primary">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polygon points="6 3 20 12 6 21 6 3"/>
                </svg>
                <span>Tóm tắt</span>
              </button>
              <button id="clearButton" type="button" class="btn-secondary">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M3 6h18"/>
                  <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
                  <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
                </svg>
                <span>Xóa làm lại</span>
              </button>
            </div>
          </form>
        </section>

        <!-- Right Panel: Result Panel -->
        <section class="panel-card result-panel" aria-live="polite">
          <div class="result-header">
            <div class="section-title">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" x2="8" y1="13" y2="13"/>
                <line x1="16" x2="8" y1="17" y2="17"/>
                <line x1="10" x2="8" y1="9" y2="9"/>
              </svg>
              <span>Kết quả tóm tắt</span>
            </div>
            <div class="result-tools">
              <span id="metaText" class="meta-text"></span>
              <div class="btn-group">
                <button id="copyResultButton" type="button" class="btn-action" disabled>
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect width="14" height="14" x="8" y="8" rx="2" ry="2"/>
                    <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>
                  </svg>
                  <span>Sao chép</span>
                </button>
                <button id="downloadResultButton" type="button" class="btn-action" disabled>
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" x2="12" y1="15" y2="3"/>
                  </svg>
                  <span>Xuất file</span>
                </button>
              </div>
            </div>
          </div>

          <div class="output-container">
            <pre id="summaryOutput" class="summary-output">Kết quả tóm tắt sẽ hiển thị tại đây.</pre>
          </div>
        </section>
      </main>
    </div>

    <script src="/static/app.js?v=2"></script>
  </body>
</html>
